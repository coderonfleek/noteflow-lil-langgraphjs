<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteFlow - Smart Note Taking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6'
          }
        }
      }
    }
  </script>
  <style>
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .modal-backdrop {
      background-color: rgba(0, 0, 0, 0.5);
    }
    .tag {
      transition: all 0.2s ease;
    }
    .tag:hover {
      transform: scale(1.05);
    }
    /* Locked AI Feature Styles */
    .ai-locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .ai-locked::after {
      content: ' (Coming with AI)';
      font-size: 0.75rem;
      color: #9ca3af;
    }
    .ai-locked-section {
      opacity: 0.6;
    }
    .ai-locked-section .ai-locked-label {
      display: inline;
    }
    .ai-unlocked-section .ai-locked-label {
      display: none;
    }
    /* Loading spinner for AI operations */
    .ai-loading {
      pointer-events: none;
    }
    .ai-loading .ai-spinner {
      display: inline-block;
    }
    .ai-spinner {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900">NoteFlow</h1>
        </div>
        <button onclick="openModal()" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium flex items-center space-x-2 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          <span>New Note</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    <!-- Search and Filters -->
    <div class="mb-8 flex flex-col sm:flex-row gap-4">
      <div class="flex-1 relative">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search notes..." 
          class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          oninput="debounceSearch()"
        >
        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
      <div class="flex gap-2">
        <select id="tagFilter" onchange="loadNotes()" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
          <option value="">All Tags</option>
        </select>
        <!-- AI Feature: Smart Search -->
        <button 
          id="btnSmartSearch"
          onclick="handleSmartSearch()"
          class="ai-locked px-4 py-3 border border-gray-300 rounded-lg bg-white text-gray-700 hover:bg-gray-50 transition-colors flex items-center"
        >
          <svg class="w-5 h-5 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          <span>Smart Search</span>
        </button>
      </div>
    </div>

    <!-- Notes Grid -->
    <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Notes will be loaded here -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
      <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <h3 class="text-lg font-medium text-gray-900 mb-2">No notes found</h3>
      <p class="text-gray-500 mb-4">Get started by creating your first note</p>
      <button onclick="openModal()" class="bg-primary hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        Create Note
      </button>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden text-center py-16">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div>
      <p class="text-gray-500 mt-4">Loading notes...</p>
    </div>
  </main>

  <!-- Note Modal (Create/Edit) -->
  <div id="noteModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="modal-backdrop fixed inset-0" onclick="closeModal()"></div>
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-xl max-w-2xl w-full p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="modalTitle" class="text-xl font-bold text-gray-900">New Note</h2>
          <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        
        <form id="noteForm" onsubmit="saveNote(event)">
          <input type="hidden" id="noteId">
          
          <div class="mb-4">
            <label for="noteTitle" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input 
              type="text" 
              id="noteTitle" 
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
              placeholder="Enter note title..."
            >
          </div>
          
          <div class="mb-4">
            <label for="noteContent" class="block text-sm font-medium text-gray-700 mb-1">Content</label>
            <textarea 
              id="noteContent" 
              required
              rows="8"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent resize-none"
              placeholder="Write your note..."
            ></textarea>
          </div>
          
          <div class="mb-4">
            <div class="flex justify-between items-center mb-1">
              <label for="noteTags" class="block text-sm font-medium text-gray-700">
                Tags <span class="text-gray-400 font-normal">(comma separated)</span>
              </label>
              <!-- AI Feature: Auto-suggest Tags -->
              <button 
                type="button" 
                id="btnSuggestTags"
                onclick="handleSuggestTags()"
                class="ai-locked text-sm text-primary hover:text-indigo-700 flex items-center"
              >
                <svg class="w-4 h-4 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                </svg>
                <span>Suggest Tags</span>
              </button>
            </div>
            <input 
              type="text" 
              id="noteTags"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
              placeholder="e.g., work, ideas, important"
            >
            <!-- Suggested Tags Container -->
            <div id="suggestedTagsContainer" class="hidden mt-2">
              <p class="text-xs text-gray-500 mb-1">Suggested tags (click to add):</p>
              <div id="suggestedTags" class="flex flex-wrap gap-1"></div>
            </div>
          </div>

          <!-- AI Features Section -->
          <div id="aiEditFeatures" class="mb-6 p-4 bg-gray-50 rounded-lg border border-dashed border-gray-300 ai-locked-section">
            <p class="text-sm text-gray-500 mb-3 font-medium">
              🤖 AI Features 
              <span class="ai-locked-label text-xs text-gray-400">(Coming Soon)</span>
            </p>
            <div class="flex flex-wrap gap-2">
              <!-- AI Feature: Summarize -->
              <button 
                type="button" 
                id="btnSummarize"
                onclick="handleSummarize()"
                class="ai-locked text-xs px-3 py-1.5 bg-white border border-gray-200 rounded-full hover:bg-indigo-50 hover:border-indigo-300 transition-colors flex items-center"
              >
                <svg class="w-3 h-3 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span>Summarize</span>
              </button>
              <!-- AI Feature: Find Related -->
              <button 
                type="button" 
                id="btnFindRelated"
                onclick="handleFindRelated()"
                class="ai-locked text-xs px-3 py-1.5 bg-white border border-gray-200 rounded-full hover:bg-indigo-50 hover:border-indigo-300 transition-colors flex items-center"
              >
                <svg class="w-3 h-3 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span>Find Related</span>
              </button>
              <!-- AI Feature: Improve Writing -->
              <button 
                type="button" 
                id="btnImproveWriting"
                onclick="handleImproveWriting()"
                class="ai-locked text-xs px-3 py-1.5 bg-white border border-gray-200 rounded-full hover:bg-indigo-50 hover:border-indigo-300 transition-colors flex items-center"
              >
                <svg class="w-3 h-3 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                <span>Improve Writing</span>
              </button>
            </div>
          </div>
          
          <div class="flex justify-end space-x-3">
            <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
              Cancel
            </button>
            <button type="submit" class="px-4 py-2 bg-primary hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">
              Save Note
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- View Note Modal -->
  <div id="viewModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="modal-backdrop fixed inset-0" onclick="closeViewModal()"></div>
    <div class="relative min-h-screen flex items-center justify-center p-4">
      <div class="relative bg-white rounded-xl shadow-xl max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
          <h2 id="viewTitle" class="text-xl font-bold text-gray-900"></h2>
          <button onclick="closeViewModal()" class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        
        <div id="viewTags" class="flex flex-wrap gap-2 mb-4"></div>
        
        <div id="viewContent" class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap mb-6"></div>
        
        <!-- AI Feature: Summary Display -->
        <div id="summarySection" class="hidden mb-6 p-4 bg-indigo-50 rounded-lg border border-indigo-100">
          <div class="flex justify-between items-center mb-2">
            <p class="text-sm font-medium text-indigo-900">📝 AI Summary</p>
            <button onclick="hideSummary()" class="text-indigo-400 hover:text-indigo-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <p id="summaryContent" class="text-sm text-indigo-700"></p>
        </div>

        <!-- AI Feature: Related Notes Display -->
        <div id="relatedNotesSection" class="hidden mb-6 p-4 bg-purple-50 rounded-lg border border-purple-100">
          <div class="flex justify-between items-center mb-2">
            <p class="text-sm font-medium text-purple-900">🔗 Related Notes</p>
            <button onclick="hideRelatedNotes()" class="text-purple-400 hover:text-purple-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <div id="relatedNotesList" class="space-y-2"></div>
        </div>

        <!-- AI Actions in View Modal -->
        <div id="viewAiActions" class="mb-6 flex flex-wrap gap-2 ai-locked-section">
          <button 
            id="btnViewSummarize"
            onclick="handleSummarizeView()"
            class="ai-locked text-xs px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-full hover:bg-indigo-200 transition-colors flex items-center"
          >
            <svg class="w-3 h-3 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span>Summarize</span>
          </button>
          <button 
            id="btnViewFindRelated"
            onclick="handleFindRelatedView()"
            class="ai-locked text-xs px-3 py-1.5 bg-purple-100 text-purple-700 rounded-full hover:bg-purple-200 transition-colors flex items-center"
          >
            <svg class="w-3 h-3 mr-1 ai-spinner animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span>Find Related</span>
          </button>
        </div>
        
        <div class="flex justify-between items-center text-sm text-gray-500 pt-4 border-t border-gray-100">
          <span id="viewDate"></span>
          <div class="flex space-x-2">
            <button onclick="editCurrentNote()" class="px-3 py-1 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
              Edit
            </button>
            <button onclick="deleteCurrentNote()" class="px-3 py-1 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition-colors">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center space-x-2">
    <span id="toastMessage"></span>
  </div>

</body>
</html>
